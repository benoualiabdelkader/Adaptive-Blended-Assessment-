ai_rule_map:
  - ai_output: "Forethought risk = High"
    rule_id: "A1"
    pedagogical_interpretation: "Weak planning and low criteria awareness"
    feedback_template: "planning_scaffold"
    onsite_intervention: "rubric_walkthrough_and_outline_support"

  - ai_output: "Forethought risk = Medium"
    rule_id: "A2"
    pedagogical_interpretation: "Partial planning but inconsistent task preparation"
    feedback_template: "planning_prompt"
    onsite_intervention: "guided_planning_support_and_micro_goal_setting"

  - ai_output: "Engagement risk = High"
    rule_id: "D1"
    pedagogical_interpretation: "Disengagement / low behavioural participation"
    feedback_template: "motivational_reengagement"
    onsite_intervention: "teacher_checkin_task_clarification_and_simplified_scaffold"

  - ai_output: "Learner profile = Effortful but struggling"
    rule_id: "D2"
    pedagogical_interpretation: "Strong effort but weak strategy use"
    feedback_template: "explicit_strategic_instruction"
    onsite_intervention: "scaffolded_support_session_on_structure_and_argumentation"

  - ai_output: "Learner profile = Fragile regulator"
    rule_id: "D3"
    pedagogical_interpretation: "Adequate product but unstable process regulation"
    feedback_template: "metacognitive_prompt"
    onsite_intervention: "reflection_support_and_light_teacher_monitoring"

  - ai_output: "Argumentation weakness = High"
    rule_id: "B1"
    pedagogical_interpretation: "Weak claim-evidence-reasoning structure"
    feedback_template: "argument_scaffold"
    onsite_intervention: "claim_evidence_explanation_modelling"

  - ai_output: "Argumentation weakness = Medium"
    rule_id: "B2"
    pedagogical_interpretation: "Argument present but underdeveloped"
    feedback_template: "argument_expansion"
    onsite_intervention: "guided_expansion_of_reasoning_and_support"

  - ai_output: "Argumentation competence = High"
    rule_id: "B3"
    pedagogical_interpretation: "Strong reasoning already present"
    feedback_template: "metacognitive_extension"
    onsite_intervention: "counter_argument_integration_or_advanced_extension"

  - ai_output: "Discourse competence = Low"
    rule_id: "B4"
    pedagogical_interpretation: "Weak organization and poor cohesion"
    feedback_template: "cohesion_support"
    onsite_intervention: "paragraph_restructuring_with_model"

  - ai_output: "Discourse competence = Medium"
    rule_id: "B5"
    pedagogical_interpretation: "Developing organization and cohesion"
    feedback_template: "organization_support"
    onsite_intervention: "guided_improvement_of_transitions_and_sequencing"

  - ai_output: "Linguistic accuracy risk = High"
    rule_id: "B6"
    pedagogical_interpretation: "Persistent grammar problems affecting clarity"
    feedback_template: "direct_corrective_feedback"
    onsite_intervention: "mini_grammar_lesson_on_recurrent_errors"

  - ai_output: "Linguistic accuracy risk = Medium"
    rule_id: "B7"
    pedagogical_interpretation: "Partial grammatical control"
    feedback_template: "metalinguistic_feedback"
    onsite_intervention: "guided_correction_with_rule_explanation"

  - ai_output: "Linguistic control = High"
    rule_id: "B8"
    pedagogical_interpretation: "Good grammatical control"
    feedback_template: "fluency_extension"
    onsite_intervention: "advanced_stylistic_refinement"

  - ai_output: "Lexical competence = Low"
    rule_id: "B9"
    pedagogical_interpretation: "Restricted vocabulary and weak academic register"
    feedback_template: "lexical_enrichment"
    onsite_intervention: "academic_vocabulary_support_and_model_expressions"

  - ai_output: "Lexical competence = Medium"
    rule_id: "B10"
    pedagogical_interpretation: "Developing lexical precision"
    feedback_template: "lexical_refinement"
    onsite_intervention: "synonym_training_and_lexical_upgrading"

  - ai_output: "Revision depth = Low"
    rule_id: "C1"
    pedagogical_interpretation: "No revision or very superficial revision"
    feedback_template: "revision_prompt"
    onsite_intervention: "guided_revision_checklist"

  - ai_output: "Revision depth = Medium"
    rule_id: "C2"
    pedagogical_interpretation: "Partial revision but limited meaning-level change"
    feedback_template: "global_revision_feedback"
    onsite_intervention: "teacher_modelling_of_deeper_global_revision"

  - ai_output: "Revision depth = High"
    rule_id: "C3"
    pedagogical_interpretation: "Effective revision behaviour"
    feedback_template: "metacognitive_feedback"
    onsite_intervention: "reflection_on_successful_revision_strategies"

  - ai_output: "Feedback uptake risk = High"
    rule_id: "C4"
    pedagogical_interpretation: "Feedback viewed but not used"
    feedback_template: "feedback_decoding"
    onsite_intervention: "feedback_interpretation_decoding_session"

  - ai_output: "Feedback uptake risk = Medium"
    rule_id: "C5"
    pedagogical_interpretation: "Partial use of feedback"
    feedback_template: "feedforward_guidance"
    onsite_intervention: "guided_application_of_comments_to_next_revision"

  - ai_output: "Feedback uptake = Strong"
    rule_id: "C6"
    pedagogical_interpretation: "Feedback effectively internalized"
    feedback_template: "reinforcement_feedback"
    onsite_intervention: "positive_reinforcement_and_extension_task"

  - ai_output: "Help-seeking regulation = Adaptive"
    rule_id: "D4"
    pedagogical_interpretation: "Student actively monitors difficulty and seeks clarification"
    feedback_template: "dialogic_scaffolding"
    onsite_intervention: "short_clarification_conference_or_micro_feedback"

  - ai_output: "Help-seeking risk = High"
    rule_id: "D5"
    pedagogical_interpretation: "Weak performance with no clarification-seeking"
    feedback_template: "metacognitive_prompt"
    onsite_intervention: "proactive_teacher_intervention_to_surface_hidden_difficulty"

  - ai_output: "Predicted improvement = Low"
    rule_id: "E1"
    pedagogical_interpretation: "High risk of limited progress without support"
    feedback_template: "intensive_support_plan"
    onsite_intervention: "individualized_support_plan_targeting_weakest_dimensions"

  - ai_output: "Predicted improvement = Medium/High"
    rule_id: "E2"
    pedagogical_interpretation: "Good growth potential if support is focused"
    feedback_template: "targeted_development_feedback"
    onsite_intervention: "focused_support_on_weakest_priority_area"

  - ai_output: "Argument competence probability = Medium"
    rule_id: "F1"
    pedagogical_interpretation: "Developing but unstable argumentative competence"
    feedback_template: "argument_refinement"
    onsite_intervention: "guided_refinement_of_evidence_integration_and_explanation"

  - ai_output: "Self-regulated revision competence = Low"
    rule_id: "F2"
    pedagogical_interpretation: "Weak regulation of the writing process"
    feedback_template: "metacognitive_training"
    onsite_intervention: "explicit_srl_training_planning_monitoring_evaluating"
